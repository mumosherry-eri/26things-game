<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>关于你的26个变数</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <main id="game-shell">
    <button id="game-menu-button" type="button" aria-label="打开菜单">☰</button>
    <nav id="game-menu" aria-label="游戏菜单">
      <button id="menu-back" type="button">返回上一段</button>
      <button id="menu-navigate" type="button">Navigate</button>
      <button id="menu-stats" type="button">状态</button>
      <button id="menu-memo" type="button">记忆</button>
      <button id="menu-save" type="button">保存</button>
      <button id="menu-load" type="button">读取</button>
      <button id="menu-restart" type="button">重新开始</button>
    </nav>
    <section id="story" aria-live="polite"><div id="passages"></div></section>
    <div id="stats-modal" class="stats-modal">
      <div class="stats-backdrop" onclick="closeStats()"></div>
      <div class="stats-card" role="dialog" aria-modal="true" aria-label="状态面板">
        <div class="stats-head"><span>状态面板</span><button class="stats-close" onclick="closeStats()" aria-label="关闭">×</button></div>
        <div id="stats-body" class="stats-body"></div>
      </div>
    </div>
    <div id="memo-modal" class="memo-modal">
      <div class="stats-backdrop" onclick="closeMemo()"></div>
      <div class="memo-card" role="dialog" aria-modal="true" aria-label="剧情记忆">
        <div class="stats-head"><span>剧情记忆</span><button class="stats-close" onclick="closeMemo()" aria-label="关闭">×</button></div>
        <div id="memo-body" class="memo-body"></div>
      </div>
    </div>
    <div id="navigate-modal" class="navigate-modal">
      <div class="stats-backdrop" onclick="closeNavigate()"></div>
      <div class="navigate-card" role="dialog" aria-modal="true" aria-label="Navigate">
        <div class="stats-head"><span>Navigate</span><button class="stats-close" onclick="closeNavigate()" aria-label="关闭">×</button></div>
        <div id="navigate-body" class="navigate-body"></div>
      </div>
    </div>
  </main>
    <script src="js/story/00-start.js"></script>
    <script src="js/story/01-ambitious.js"></script>
    <script src="js/story/02-blur.js"></script>
    <script src="js/story/03-caleb.js"></script>
    <script src="js/story/04-drown.js"></script>
    <script src="js/story/catalog.js"></script>
    <script src="js/runtime.js"></script>
    <script src="js/ui/phone-chat.js"></script>
    <script src="js/ui/sns.js"></script>
    <script src="js/ui/effects.js"></script>
    <script src="js/ui/panels.js"></script>
</body>
</html>
